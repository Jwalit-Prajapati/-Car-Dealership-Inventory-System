spring:
  application:
    name: inventory-system
  datasource:
    url: jdbc:postgresql://localhost:5432/inventory_db
    username: admin
    password: admin@123
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    web:
      pageable:
        max-page-size: 100
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  upload:
    dir: ${UPLOAD_DIR:uploads}

jwt:
  # Required, no default. Must be a base64-encoded key (JwtService decodes it, not raw text) —
  # generate with `openssl rand -base64 32`. See README "Set required environment variables".
  secret: ${JWT_SECRET}
  expiration: 86400000
