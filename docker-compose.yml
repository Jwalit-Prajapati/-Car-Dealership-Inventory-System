services:
  db:
    image: postgres:15-alpine
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin@123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: inventory-app
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/inventory_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin@123
      - JWT_SECRET=tbBuiiqfAT/zMaxn6F2dGBQi58Jr/2du87efvsmBsHdW2lnSFYDsdg8FUe6tUB6h
      - UPLOAD_DIR=/app/uploads
    volumes:
      - vehicle-images:/app/uploads
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: inventory-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  vehicle-images:
